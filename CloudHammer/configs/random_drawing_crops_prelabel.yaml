  rasterized_pages: data/rasterized_pages
  delta_json: data/delta_json
  roi_images: data/roi_images
  cloud_roi_images: data/random_drawing_crops/images
  api_cloud_inputs: data/random_drawing_crops/api_inputs
  api_cloud_predictions: data/random_drawing_crops/api_predictions
  api_cloud_labels_unreviewed: data/random_drawing_crops/gpt_labels
  api_cloud_review: data/random_drawing_crops/gpt_review
  labels: data/labels
  cloud_labels: data/cloud_labels
  cloud_labels_reviewed: data/cloud_labels_reviewed
  manifests: data/manifests
  models: models
  runs: runs
